<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- D20 dice shape -->
  <polygon points="50,5 95,30 95,70 50,95 5,70 5,30" fill="#8b2635" stroke="#d4a853" stroke-width="3"/>
  <!-- Inner triangle top -->
  <polygon points="50,15 85,33 50,50" fill="none" stroke="#d4a853" stroke-width="1.5" opacity="0.7"/>
  <!-- Inner triangle bottom -->
  <polygon points="50,50 15,67 50,85" fill="none" stroke="#d4a853" stroke-width="1.5" opacity="0.7"/>
  <!-- Inner left -->
  <line x1="15" y1="33" x2="50" y2="50" stroke="#d4a853" stroke-width="1.5" opacity="0.7"/>
  <!-- Inner right -->
  <line x1="85" y1="67" x2="50" y2="50" stroke="#d4a853" stroke-width="1.5" opacity="0.7"/>
  <!-- "20" text -->
  <text x="50" y="57" font-family="Georgia, serif" font-size="22" font-weight="bold"
        fill="#d4a853" text-anchor="middle">20</text>
</svg>
